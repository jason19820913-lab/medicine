<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上處方集查詢</title>
<style>
  :root {
    --primary: #1FAE9F;
    --primary-dark: #178478;
    --primary-soft: #D4F0EC;
    --accent: #2DC7B5;
    --bg: #F4F8F7;
    --card: #ffffff;
    --border: #DEE8E6;
    --text: #0E3B37;
    --text-mute: #6B8682;
    --shadow: 0 1px 3px rgba(20,80,70,.06), 0 1px 2px rgba(20,80,70,.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    padding: 20px 0;
    box-shadow: var(--shadow);
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
  header .brand { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 24px; font-weight: 600; margin: 0; }
  header .subtitle { font-size: 13px; opacity: .85; margin-top: 4px; }
  .logo-icon {
    width: 52px; height: 52px; border-radius: 50%; background: #fff; padding: 4px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
  }
  .logo-icon img { width: 100%; height: 100%; }
  .search-hero {
    background: #fff;
    padding: 32px 20px;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    max-width: 800px; margin: 0 auto; position: relative;
  }
  .search-box input {
    width: 100%;
    font-size: 16px;
    padding: 14px 50px 14px 20px;
    border: 2px solid var(--border);
    border-radius: 30px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    background: #fff;
  }
  .search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(30,96,145,.1);
  }
  .search-box .search-btn {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: var(--primary); color: #fff;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hint {
    max-width: 800px; margin: 12px auto 0;
    font-size: 13px; color: var(--text-mute); text-align: center;
  }
  main { padding: 24px 20px; }
  .layout { display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
  @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
  aside {
    background: var(--card); border-radius: 10px; box-shadow: var(--shadow);
    padding: 16px; height: fit-content; position: sticky; top: 20px;
  }
  aside h3 {
    font-size: 14px; margin: 0 0 12px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .5px; font-weight: 600;
  }
  .cat-list { list-style: none; padding: 0; margin: 0; }
  .cat-list li {
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: background .15s;
  }
  .cat-list li:hover { background: #f1f5f9; }
  .cat-list li:hover { background: var(--primary-soft); }
  .cat-list li.active { background: var(--primary); color: #fff; }
  .cat-list li.active:hover { background: var(--primary-dark); }
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .toolbar .count { font-size: 14px; color: var(--text-mute); }
  .toolbar .admin-link {
    font-size: 13px; color: var(--text-mute); text-decoration: none;
    padding: 6px 12px; border-radius: 6px;
  }
  .toolbar .admin-link:hover { background: #fff; color: var(--primary); }
  .drug-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
  }
  .drug-card {
    background: var(--card); border-radius: 10px; overflow: hidden;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    display: flex; flex-direction: column;
  }
  .drug-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,.08);
  }
  .drug-card .photo {
    aspect-ratio: 4/3; background: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute); font-size: 40px;
    overflow: hidden;
  }
  .drug-card .photo img { width: 100%; height: 100%; object-fit: cover; }
  .drug-card .info { padding: 14px; flex: 1; }
  .drug-card .info .name-zh { font-weight: 600; font-size: 16px; color: var(--text); }
  .drug-card .info .name-en { font-size: 13px; color: var(--text-mute); margin-top: 2px; }
  .drug-card .info .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip {
    font-size: 12px; background: var(--primary-soft); color: var(--primary-dark);
    padding: 2px 8px; border-radius: 12px;
  }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-mute);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

  /* modal */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(15,23,42,.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-mask.show { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 900px; width: 100%;
    max-height: 90vh; overflow-y: auto; position: relative;
    animation: slide .2s ease-out;
  }
  @keyframes slide { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(0,0,0,.05); cursor: pointer; font-size: 20px;
  }
  .modal-close:hover { background: rgba(0,0,0,.1); }
  .modal-content { padding: 30px; }
  .modal-header {
    display: grid; grid-template-columns: 220px 1fr; gap: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  @media (max-width: 600px) { .modal-header { grid-template-columns: 1fr; } }
  .modal-photo {
    aspect-ratio: 1; background: #f1f5f9; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; color: var(--text-mute);
  }
  .modal-photo img { width: 100%; height: 100%; object-fit: cover; }
  .modal-title h2 { margin: 0 0 6px; font-size: 24px; }
  .modal-title .sub { font-size: 15px; color: var(--text-mute); }
  .modal-title .codes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .modal-title .codes .chip { font-size: 13px; }
  .sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 24px; }
  .section h4 {
    font-size: 13px; color: var(--text-mute); text-transform: uppercase;
    letter-spacing: .5px; margin: 0 0 8px; font-weight: 600;
  }
  .section p { margin: 0; white-space: pre-wrap; font-size: 14px; }
  .section.wide { grid-column: 1 / -1; }
  footer {
    text-align: center; padding: 30px 20px; color: var(--text-mute);
    font-size: 13px; border-top: 1px solid var(--border); margin-top: 40px;
  }
  .loading { text-align: center; padding: 40px; color: var(--text-mute); }
  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid #e2e8f0; border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="container brand">
    <div class="logo-icon"><img src="logo.png" alt="Elite Clinic"></div>
    <div>
      <h1 id="site-title">Elite Clinic 處方集查詢</h1>
      <div class="subtitle">Drug Formulary Search</div>
    </div>
  </div>
</header>

<section class="search-hero">
  <div class="search-box">
    <input id="search-input" type="text" placeholder="輸入藥品中文名 / 英文名 / 學名 / 健保代碼 / 院內代碼..." autocomplete="off">
    <button class="search-btn" id="search-btn" aria-label="搜尋">🔍</button>
  </div>
  <div class="hint">支援模糊搜尋 · 可用分類瀏覽 · 點擊藥品卡查看完整說明</div>
</section>

<main>
  <div class="container layout">
    <aside>
      <h3>分類瀏覽</h3>
      <ul class="cat-list" id="cat-list">
        <li class="active" data-cat="">全部</li>
      </ul>
    </aside>
    <section>
      <div class="toolbar">
        <div class="count" id="count">載入中...</div>
        <a class="admin-link" href="admin.html">管理員登入 →</a>
      </div>
      <div id="results" class="drug-grid"></div>
    </section>
  </div>
</main>

<div class="modal-mask" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<footer>
  本系統僅供參考 · 用藥請諮詢醫師或藥師 · © <span id="year"></span>
</footer>

<script>
  // ============ 設定（請修改）============
  const API_URL = 'https://script.google.com/macros/s/AKfycbyBurrw2JPcBLflnXHJnTsmbYtkwpNIiXWz9t-HZtxZtWHJ5Jyyxr1JzN9aGYf4MKeLIA/exec';
  const SITE_TITLE = 'Elite Clinic 處方集查詢';
  // =====================================

  document.getElementById('site-title').textContent = SITE_TITLE;
  document.title = SITE_TITLE;
  document.getElementById('year').textContent = new Date().getFullYear();

  let state = { q: '', category: '', items: [] };

  async function api(action, params = {}) {
    const url = new URL(API_URL);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => { if (v !== undefined && v !== '') url.searchParams.set(k, v); });
    const res = await fetch(url.toString());
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '呼叫失敗');
    return data.data;
  }

  async function loadCategories() {
    try {
      const cats = await api('listCategories');
      const ul = document.getElementById('cat-list');
      cats.forEach(c => {
        const li = document.createElement('li');
        li.textContent = c.name;
        li.dataset.cat = c.name;
        ul.appendChild(li);
      });
      ul.addEventListener('click', e => {
        if (e.target.tagName !== 'LI') return;
        ul.querySelectorAll('li').forEach(l => l.classList.remove('active'));
        e.target.classList.add('active');
        state.category = e.target.dataset.cat;
        search();
      });
    } catch (err) {
      console.warn('Category load failed', err);
    }
  }

  async function search() {
    document.getElementById('count').textContent = '搜尋中...';
    document.getElementById('results').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const data = await api('search', { q: state.q, category: state.category, limit: 200 });
      state.items = data.items;
      render();
    } catch (err) {
      document.getElementById('results').innerHTML = '';
      document.getElementById('count').textContent = '錯誤：' + err.message;
    }
  }

  function render() {
    const root = document.getElementById('results');
    const count = document.getElementById('count');
    count.textContent = `共 ${state.items.length} 筆結果`;
    if (!state.items.length) {
      root.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>找不到相關藥品</div></div>';
      return;
    }
    root.innerHTML = state.items.map(d => `
      <div class="drug-card" data-id="${escapeHtml(d.id)}">
        <div class="photo">
          ${d.photo_url ? `<img src="${escapeHtml(d.photo_url)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='💊'">` : '💊'}
        </div>
        <div class="info">
          <div class="name-zh">${escapeHtml(d.name_zh || '')}</div>
          <div class="name-en">${escapeHtml(d.name_en || '')}</div>
          <div class="meta">
            ${d.dosage_form ? `<span class="chip">${escapeHtml(d.dosage_form)}${d.strength ? ' ' + escapeHtml(d.strength) : ''}</span>` : ''}
            ${d.category ? `<span class="chip">${escapeHtml(d.category)}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    root.querySelectorAll('.drug-card').forEach(el => {
      el.addEventListener('click', () => openDetail(el.dataset.id));
    });
  }

  function openDetail(id) {
    const d = state.items.find(x => x.id === id);
    if (!d) return;
    const mc = document.getElementById('modal-content');
    mc.innerHTML = `
      <div class="modal-header">
        <div class="modal-photo">
          ${d.photo_url ? `<img src="${escapeHtml(d.photo_url)}" alt="" onerror="this.parentElement.innerHTML='💊'">` : '💊'}
        </div>
        <div class="modal-title">
          <h2>${escapeHtml(d.name_zh || '')}</h2>
          <div class="sub">${escapeHtml(d.name_en || '')}</div>
          ${d.generic_name ? `<div class="sub"><em>學名：${escapeHtml(d.generic_name)}</em></div>` : ''}
          <div class="codes">
            ${d.nhi_code ? `<span class="chip">健保 ${escapeHtml(d.nhi_code)}</span>` : ''}
            ${d.product_code ? `<span class="chip">院內 ${escapeHtml(d.product_code)}</span>` : ''}
            ${d.category ? `<span class="chip">${escapeHtml(d.category)}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="sections">
        ${sec('劑型 / 含量', [d.dosage_form, d.strength].filter(Boolean).join(' / '))}
        ${sec('製造廠商', d.manufacturer)}
        ${sec('顏色 / 形狀', [d.color, d.shape].filter(Boolean).join(' / '))}
        ${sec('標記 / 刻痕', [d.marking, d.scoring].filter(Boolean).join(' / '))}
        ${sec('懷孕分級', d.pregnancy_category)}
        ${sec('儲存條件', d.storage)}
        ${sec('藥物機轉 Mechanism of Action', d.mechanism, true)}
        ${sec('適應症 Indications', d.indications, true)}
        ${sec('用法用量 Dosage', d.dosage, true)}
        ${sec('極大量 Maximum Dose', d.max_dose, true)}
        ${sec('副作用 Side Effects', d.side_effects, true)}
        ${sec('禁忌症 Contraindications', d.contraindications, true)}
        ${sec('交互作用 Drug Interactions', d.interactions, true)}
        ${sec('健保給付規定', d.nhi_rule, true)}
        ${sec('注意事項', d.notes, true)}
      </div>
    `;
    document.getElementById('modal').classList.add('show');
  }

  function sec(title, content, wide) {
    if (!content) return '';
    return `<div class="section ${wide ? 'wide' : ''}"><h4>${title}</h4><p>${escapeHtml(content)}</p></div>`;
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); }
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function escapeHtml(s) {
    return (s == null ? '' : String(s))
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // events
  const input = document.getElementById('search-input');
  let debounce;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { state.q = input.value.trim(); search(); }, 300);
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { state.q = input.value.trim(); search(); } });
  document.getElementById('search-btn').addEventListener('click', () => { state.q = input.value.trim(); search(); });

  // init
  loadCategories();
  search();
</script>
</body>
</html>
